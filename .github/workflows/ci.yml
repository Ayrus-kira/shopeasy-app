build-and-push:
    runs-on: ubuntu-latest
    needs: [test-product-service, test-cart-service, test-payment-service, test-order-service]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-product:latest

      - name: Build & Push Cart Service
        uses: docker/build-push-action@v5
        with:
          context: ./cart-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-cart:latest

      - name: Build & Push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-payment:latest

      - name: Build & Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-order:latest
