name: ShopEasy CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-product-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install & Test Product Service
        run: |
          cd product-service
          pip install -r requirements.txt
          pytest test_app.py -v

  test-cart-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install & Test Cart Service
        run: |
          cd cart-service
          pip install -r requirements.txt
          pytest test_app.py -v

  test-payment-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install & Test Payment Service
        run: |
          cd payment-service
          pip install -r requirements.txt
          pytest test_app.py -v

  test-order-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install & Test Order Service
        run: |
          cd order-service
          pip install -r requirements.txt
          pytest test_app.py -v
