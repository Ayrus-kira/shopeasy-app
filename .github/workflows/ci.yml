name: ShopEasy CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, cart-service, payment-service, order-service]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          python -m pytest test_app.py -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-product:latest

      - name: Build and Push Cart Service
        uses: docker/build-push-action@v5
        with:
          context: ./cart-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-cart:latest

      - name: Build and Push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-payment:latest

      - name: Build and Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-order:latest
