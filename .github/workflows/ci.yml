name: ShopEasy CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, cart-service, payment-service, order-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Test ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pytest test_app.py -v

  build-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push all services
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          for service in product cart payment order; do
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-${service}:${TAG} ./${service}-service
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-${service}:${TAG}
          done

  update-helm:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: YOUR_USERNAME/shopeasy-helm
          token: ${{ secrets.HELM_REPO_TOKEN }}

      - name: Update image tags in values.yaml
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          sed -i "s/tag: .*/tag: ${TAG}/" shopeasy/values.yaml

      - name: Commit and push
        run: |
          git config user.email "ci@shopeasy.com"
          git config user.name "CI Bot"
          git add shopeasy/values.yaml
          git commit -m "ci: update image tags to ${{ needs.build-push.outputs.image_tag }}"
          git push
