name: ShopEasy CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, cart-service, payment-service, order-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          python -m pytest test_app.py -v

  build-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          TAG=${{ steps.tag.outputs.tag }}
          for service in product cart payment order; do
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-${service}:${TAG} ./${service}-service
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopeasy-${service}:${TAG}
          done

  update-helm:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Ayrus-kira/shopeasy-helm
          token: ${{ secrets.HELM_REPO_TOKEN }}

      - run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          sed -i "s/tag: .*/tag: ${TAG}/g" shopeasy/values.yaml

      - run: |
          git config user.email "ci@shopeasy.com"
          git config user.name "CI Bot"
          git add shopeasy/values.yaml
          git commit -m "ci: update image tag"
          git push
